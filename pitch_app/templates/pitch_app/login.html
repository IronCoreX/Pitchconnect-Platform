<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | PitchConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md p-8 bg-zinc-900 rounded-[2.5rem] border border-zinc-800 shadow-2xl">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black text-lime-400 tracking-tighter italic uppercase">PitchConnect</h1>
            <p class="text-zinc-500 text-sm mt-2">Enter the elite arena.</p>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <input type="hidden" name="next" value="{{ request.GET.next }}">

            <div class="space-y-2">
                {{ form.as_p }}
            </div>

            <button type="submit" class="w-full bg-lime-400 text-black font-black py-4 rounded-2xl hover:bg-white transition uppercase tracking-widest mt-4">
                Sign In
            </button>
        </form>

        <p class="text-center text-zinc-500 text-xs mt-8">
            New player? <a href="{% url 'register' %}" class="text-white underline font-bold">Join the club</a>
        </p>
    </div>

    <style>
        p { margin-bottom: 1rem; }
        input { 
            width: 100%; 
            background: #18181b; 
            border: 1px solid #27272a; 
            padding: 0.75rem 1rem; 
            border-radius: 0.75rem; 
            margin-top: 0.25rem;
            outline: none;
        }
        input:focus { border-color: #a3e635; }
        label { font-size: 0.75rem; text-transform: uppercase; color: #71717a; font-weight: 700; }
    </style>
</body>
</html>
